name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-tree-guard:
    name: Public tree secret/artifact guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any forbidden file is tracked
        run: node app/scripts/guard-public-tree.mjs

  check-and-test:
    name: Syntax check and tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['25']
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Migration check (fresh database builds and is idempotent)
        run: npm run migrate:check
      - name: Tests
        run: npm test
