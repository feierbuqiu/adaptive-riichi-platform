services:
  app:
    build:
      context: ../app
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 256
    cpus: 1.5
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    env_file:
      - ../app/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      SOURCE_ROOT: /opt/adaptive-test-source
      DB_PATH: /var/lib/adaptive-test/app.sqlite
      PRACTICE_BANK_ROOT: /opt/adaptive-test-source/practice-bank
      EXAM_ENABLED: "false"
    volumes:
      - ../private-data/app:/var/lib/adaptive-test
      - ../private-data/practice-bank:/opt/adaptive-test-source/practice-bank:ro
      - ../assets/mahjong-tiles/tiles:/opt/adaptive-test-source/assets/mahjong-tiles/tiles:ro
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
